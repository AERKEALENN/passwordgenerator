name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Qt5
        run: |
          sudo apt-get update
          sudo apt-get install -y qt5-qmake qtbase5-dev

      - name: Configure with CMake
        run: |
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..

      - name: Build
        run: |
          cd build
          make -j$(nproc)

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: build/passwordgenerator
          retention-days: 30

  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install MSYS2 and Qt5
        run: |
          choco install msys2 -y
          refreshenv
          pacman -Sy --noconfirm mingw-w64-x86_64-qt5-base mingw-w64-x86_64-cmake mingw-w64-x86_64-toolchain

      - name: Configure with CMake
        run: |
          C:\tools\msys64\mingw64\bin\cmake.exe -G "MinGW Makefiles" -B build -DCMAKE_BUILD_TYPE=Release ..
          if %ERRORLEVEL% NEQ 0 (
            echo CMake configure failed
            exit /b 1
          )

      - name: Build
        run: |
          C:\tools\msys64\mingw64\bin\cmake.exe --build build --config Release
          if %ERRORLEVEL% NEQ 0 (
            echo Build failed
            exit /b 1
          )

      - name: Verify exe exists
        run: |
          if exist build\passwordgenerator.exe (
            echo Build successful: build\passwordgenerator.exe
          ) else (
            echo Warning: exe not found, checking build folder
            dir build /s /b 2>nul
          )

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: build/passwordgenerator.exe
          retention-days: 30

  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Qt5 and CMake
        run: |
          brew install qt@5
          brew install cmake

      - name: Configure with CMake
        run: |
          export CMAKE_PREFIX_PATH="$(brew --prefix qt@5)"
          mkdir build
          cd build
          cmake -DCMAKE_PREFIX_PATH="$CMAKE_PREFIX_PATH" -DCMAKE_BUILD_TYPE=Release ..
          cmake --build . --config Release

      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: macos-binary
          path: build/passwordgenerator
          retention-days: 30

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: List downloaded files
        run: ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}