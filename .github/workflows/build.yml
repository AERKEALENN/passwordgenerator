name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Qt5
        run: |
          sudo apt-get update
          sudo apt-get install -y qt5-qmake qtbase5-dev

      - name: Configure with CMake
        run: |
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..

      - name: Build
        run: |
          cd build
          make -j$(nproc)

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: build/passwordgenerator
          retention-days: 30

  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install build tools
        run: |
          choco install cmake ninja -y

      - name: Configure environment
        run: |
          Write-Host "Configuring PATH..."
          $cmakePath = "C:\Program Files\CMake\bin"
          if (Test-Path $cmakePath) {
            Add-Content -Path $env:GITHUB_PATH -Value $cmakePath
          }
          Write-Host "PATH configured"

      - name: Configure with CMake
        run: |
          Write-Host "Checking CMake..."
          cmake --version
          mkdir build
          cd build
          Write-Host "Running CMake..."
          cmake -G "Ninja" -DCMAKE_BUILD_TYPE=Release ..
          if ($LASTEXITCODE -ne 0) {
            Write-Host "CMake failed, trying without Qt..."
            cmake -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DQT5_FOUND=OFF ..
          }

      - name: Build
        run: |
          cd build
          ninja
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Build failed"
            exit 1
          }

      - name: Check output
        run: |
          Write-Host "=== Build output ==="
          Get-ChildItem -Path build -Recurse -Filter "*.exe" | Format-Table Name, Length
          if (Test-Path build\passwordgenerator.exe) {
            Write-Host "Found: build\passwordgenerator.exe"
          }

      - name: Upload Windows binary
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: build/passwordgenerator.exe
          retention-days: 30

  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Qt5 and CMake
        run: |
          brew install qt@5
          brew install cmake

      - name: Configure with CMake
        run: |
          export CMAKE_PREFIX_PATH="$(brew --prefix qt@5)"
          mkdir build
          cd build
          cmake -DCMAKE_PREFIX_PATH="$CMAKE_PREFIX_PATH" -DCMAKE_BUILD_TYPE=Release ..
          cmake --build . --config Release

      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: macos-binary
          path: build/passwordgenerator
          retention-days: 30

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: List downloaded files
        run: ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}