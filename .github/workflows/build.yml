name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt5
        run: |
          sudo apt-get update
          sudo apt-get install -y qtbase5-dev qtchooser qt5-qmake qtbase5-dev-tools libqt5widgets5

      - name: Configure with CMake
        run: |
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..

      - name: Build
        run: |
          cd build
          make -j$(nproc)

      - name: Create Debian package
        run: |
          mkdir -p pkg/usr/bin
          cp build/passwordgenerator pkg/usr/bin/
          mkdir -p pkg/usr/share/applications
          mkdir -p pkg/usr/share/icons/hicolor/48x48/apps

          cat > pkg/usr/share/applications/passwordgenerator.desktop << 'EOF'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=密码生成器
          Name[en_US]=Password Generator
          Comment=A simple and secure password generator tool
          Exec=passwordgenerator
          Icon=passwordgenerator
          Terminal=false
          Categories=Utility;Security;
          EOF

          mkdir -p pkg/DEBIAN
          cat > pkg/DEBIAN/control << 'EOF'
          Package: passwordgenerator
          Version: ${{ github.ref_name }}
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libc6 (>= 2.17), libqt5widgets5 (>= 5.6.0), libqt5gui5 (>= 5.6.0)
          Maintainer: ${{ github.actor }}
          Description: A Qt5-based password generator tool
          EOF

          dpkg-deb --build pkg passwordgenerator_amd64.deb

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: pkg/passwordgenerator_amd64.deb
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt5
        run: |
          choco install qt5 -y
          refreshenv

      - name: Configure with CMake
        shell: bash
        run: |
          mkdir -p build
          cd build
          cmake -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release ..
          mingw32-make

      - name: Create installer directory
        shell: bash
        run: |
          mkdir -p installer
          cp build/passwordgenerator.exe installer/
          cp README.md installer/

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: installer/passwordgenerator.exe
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt5
        run: |
          brew install qt5

      - name: Configure with CMake
        shell: bash
        run: |
          mkdir -p build
          cd build
          cmake -DCMAKE_PREFIX_PATH="$(brew --prefix qt5)" -DCMAKE_BUILD_TYPE=Release ..
          make

      - name: Create macOS app bundle
        shell: bash
        run: |
          mkdir -p PasswordGenerator.app/Contents/MacOS
          mkdir -p PasswordGenerator.app/Contents/Resources
          cp build/passwordgenerator PasswordGenerator.app/Contents/MacOS/

          cat > PasswordGenerator.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>passwordgenerator</string>
            <key>CFBundleIdentifier</key>
            <string>com.passwordgenerator.app</string>
            <key>CFBundleName</key>
            <string>Password Generator</string>
            <key>CFBundleVersion</key>
            <string>1.0.0</string>
          </dict>
          </plist>
          EOF

          tar -czf PasswordGenerator.tar.gz PasswordGenerator.app

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: PasswordGenerator.tar.gz
          retention-days: 30

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -la artifacts/

      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/linux-deb/*.deb release/
          cp artifacts/windows-exe/*.exe release/
          cp artifacts/macos-app/*.tar.gz release/
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
