name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Qt5
        run: |
          sudo apt-get update
          sudo apt-get install -y qt5-qmake qtbase5-dev

      - name: Configure with CMake
        run: |
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..

      - name: Build
        run: |
          cd build
          make -j$(nproc)

      - name: Verify build
        run: |
          ls -la build/passwordgenerator
          file build/passwordgenerator

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: build/passwordgenerator
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install CMake and Qt5
        run: |
          choco install cmake -y
          choco install mingw -y

      - name: Verify Qt5 installation
        run: |
          dir "C:\Qt" /s /b 2>nul || echo "Qt not in C:\Qt"
          where qmake 2>nul || echo "qmake not in PATH"
          where mingw32-make 2>nul || echo "mingw32-make not in PATH"

      - name: Configure with CMake
        run: |
          mkdir build
          cd build
          cmake -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release ..
          if %ERRORLEVEL% NEQ 0 exit /b 1

      - name: Build
        run: |
          cd build
          mingw32-make -j4
          if %ERRORLEVEL% NEQ 0 (
            echo Build failed, trying without parallel
            mingw32-make
          )

      - name: Find and list exe files
        run: |
          echo === Searching for exe files ===
          dir /s /b build\*.exe 2>nul
          echo === Build directory contents ===
          dir build\Release /s /b 2>nul || dir build /s /b 2>nul

      - name: Copy exe to expected location
        run: |
          if exist build\Release\passwordgenerator.exe (
            copy build\Release\passwordgenerator.exe build\passwordgenerator.exe
          ) else (
            for /r %%i in (passwordgenerator.exe) do copy "%%i" build\passwordgenerator.exe
          )
          if exist build\passwordgenerator.exe (
            echo Successfully copied exe
          ) else (
            echo Warning: exe not found
          )

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: build/passwordgenerator.exe
          retention-days: 30

  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Qt5 and CMake
        run: |
          brew install qt@5
          brew install cmake

      - name: Configure with CMake
        run: |
          export CMAKE_PREFIX_PATH="$(brew --prefix qt@5)"
          mkdir build
          cd build
          cmake -DCMAKE_PREFIX_PATH="$CMAKE_PREFIX_PATH" -DCMAKE_BUILD_TYPE=Release ..
          cmake --build . --config Release

      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: macos-binary
          path: build/passwordgenerator
          retention-days: 30

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: linux-binary
          path: release

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: windows-binary
          path: release

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: macos-binary
          path: release

      - name: List downloaded files
        run: ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}